<mat-toolbar>
  <img [routerLink]="['']" src="assets/images/logo.png" class="logo" />
  <div class="toolbar-buttons">
    <button mat-icon-button aria-label="Search">
      <mat-icon>search</mat-icon>

    </button>
  </div>
</mat-toolbar>
